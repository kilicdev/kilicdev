    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1088 190) rotate(180) scale(420 220)">
      <stop stop-color="#7B1222" stop-opacity="0.56" />
