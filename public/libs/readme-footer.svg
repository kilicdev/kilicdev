  <rect width="1280" height="220" rx="28" fill="url(#glowLeft)"/>
  <rect width="1280" height="220" rx="28" fill="url(#glowRight)"/>
  <rect width="1280" height="220" rx="28" fill="url(#grid)"/>

  <rect x="28" y="26" width="1224" height="168" rx="24" fill="#100209" stroke="url(#stroke)"/>
  <rect x="28" y="26" width="1224" height="46" rx="24" fill="#17050C"/>
  <path d="M28 54C28 38.536 40.536 26 56 26H1224C1239.46 26 1252 38.536 1252 54V72H28V54Z" fill="url(#bg)" fill-opacity="0.3"/>

