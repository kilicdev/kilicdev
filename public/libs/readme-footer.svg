<svg width="1280" height="220" viewBox="0 0 1280 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">kilic README footer</title>
  <desc id="desc">A clean terminal-inspired footer banner matching the kilicdev README hero.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="18" x2="1140" y2="202" gradientUnits="userSpaceOnUse">
      <stop stop-color="#15040A" />
      <stop offset="0.58" stop-color="#090205" />
      <stop offset="1" stop-color="#12040A" />
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(228 34) rotate(24) scale(420 180)">
      <stop stop-color="#FF6476" stop-opacity="0.24" />
      <stop offset="1" stop-color="#FF6476" stop-opacity="0" />
